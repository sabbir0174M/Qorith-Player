name: Build Qorith Player APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Qorith-Player-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Reports
          path: |
            app/build/reports/
            build/reports/
